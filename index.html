<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dowling">
<meta name="theme-color" content="#1a1a1a">
<title>Ranieri-Dowling Drill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,400..700,0..100;1,9..144,400..700,0..100&family=Source+Serif+4:ital,opsz,wght@0,8..60,400..700;1,8..60,400..600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Palette: editorial charcoal, paper-warm text, copper accent */
    --bg: #1a1a1a;            /* near-black */
    --bg-elev: #232220;       /* surface lift */
    --bg-card: #2a2825;       /* card */
    --ink: #f2ede3;            /* warm off-white, high contrast */
    --ink-soft: #d4cdbe;       /* secondary */
    --ink-mute: #978d7c;       /* muted */
    --ink-faint: #5d574c;      /* very faded */
    --accent: #d4915a;         /* warm copper, well-saturated */
    --accent-dim: #9a6840;     /* duller copper */
    --accent-soft: rgba(212,145,90,0.12);
    --danger: #d96458;         /* terracotta red */
    --danger-dim: #9c4a40;
    --good: #84a984;           /* sage green */
    --line: #36332f;           /* divider */
    --line-strong: #46423d;    /* prominent divider */

    /* Fraunces: distinctive optical-size serif. Source Serif for body. JetBrains Mono for figures. */
    --serif: "Source Serif 4", "Source Serif Pro", Charter, "Iowan Old Style", "Palatino", Georgia, serif;
    --display: "Fraunces", "Source Serif 4", Charter, "Palatino", Georgia, serif;
    --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html {
    background: var(--bg);
  }
  html, body {
    margin: 0; padding: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 17px;
    line-height: 1.55;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  body {
    padding-bottom: env(safe-area-inset-bottom);
    position: relative;
  }
  /* Fixed background overlay — works around iOS Safari background-attachment: fixed bugs */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: -1;
    background: var(--bg) radial-gradient(ellipse 100% 70% at 50% -10%, rgba(212,145,90,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  ::selection { background: var(--accent); color: var(--bg); }

  header.app-bar {
    padding: 18px 22px 14px;
    padding-top: max(18px, env(safe-area-inset-top));
    background: rgba(22, 19, 16, 0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    gap: 14px;
  }
  header.app-bar::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: -1px;
    height: 1px;
    background: linear-gradient(to right, transparent 0%, var(--accent) 30%, var(--accent) 70%, transparent 100%);
    opacity: 0.5;
  }

  .app-bar-text { flex: 1; min-width: 0; }
  .title {
    font-family: var(--display);
    font-size: 11px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    font-variation-settings: "opsz" 14;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .subtitle {
    font-style: italic;
    font-size: 13px;
    color: var(--ink-mute);
    margin-top: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .menu-btn {
    background: transparent;
    border: 1px solid var(--line-strong);
    width: 38px; height: 38px;
    border-radius: 2px;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 18px; line-height: 1;
    flex-shrink: 0;
    transition: all 0.15s;
    font-family: var(--serif);
  }
  .menu-btn:active {
    background: var(--bg-card);
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  main {
    padding: 20px 22px 100px;
    max-width: 720px;
    margin: 0 auto;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ============ PICKER ============ */
  .group-label {
    font-family: var(--display);
    text-transform: uppercase;
    letter-spacing: 0.24em;
    font-size: 11px;
    font-weight: 600;
    font-variation-settings: "opsz" 14;
    color: var(--accent);
    margin: 34px 0 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .group-label:first-of-type { margin-top: 8px; }
  .group-label::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(to right, var(--line-strong), transparent);
  }
  .subgroup-label {
    font-family: var(--serif);
    font-style: italic;
    font-size: 13px;
    color: var(--ink-mute);
    margin: 18px 0 6px 0;
  }
  .subgroup-label::before {
    content: '— ';
    color: var(--ink-faint);
  }

  .paradigm-list { list-style: none; padding: 0; margin: 0; }
  .paradigm-item {
    padding: 14px 4px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 14px;
    transition: background 0.12s, padding-left 0.15s;
  }
  .paradigm-item:active {
    background: var(--bg-card);
    padding-left: 12px;
  }
  .paradigm-item:last-child { border-bottom: none; }

  .paradigm-name {
    font-size: 18px;
    min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--ink);
  }
  .paradigm-name .lemma {
    font-family: var(--display);
    font-weight: 500;
    font-style: italic;
    font-variation-settings: "opsz" 36, "SOFT" 30;
    color: var(--ink);
    font-size: 19px;
    letter-spacing: -0.005em;
  }
  .paradigm-name .gloss {
    font-family: var(--serif);
    color: var(--ink-mute);
    font-size: 14px;
    font-style: normal;
    margin-left: 6px;
  }
  .paradigm-name .gloss::before {
    content: '· ';
    color: var(--ink-faint);
    margin-right: 2px;
  }

  .paradigm-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-mute);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: -0.02em;
  }
  .paradigm-meta .form-count { color: var(--ink-faint); }
  .reps-pip {
    display: inline-block;
    margin-left: 10px;
    padding: 2px 7px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.02em;
    border: 1px solid var(--line-strong);
    border-radius: 2px;
    color: var(--ink-mute);
    background: var(--bg-elev);
  }
  .reps-pip.partial {
    color: var(--accent);
    border-color: var(--accent-dim);
    background: rgba(212,145,90,0.06);
  }
  .reps-pip.done {
    color: var(--bg);
    background: var(--good);
    border-color: var(--good);
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex; gap: 0;
    margin: 4px 0 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 0;
    border-bottom: 1px solid var(--line);
  }
  .filter-tab {
    padding: 10px 14px;
    border: none;
    background: transparent;
    color: var(--ink-mute);
    font-family: var(--display);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.12s;
  }
  .filter-tab:active { color: var(--accent); }
  .filter-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ============ MODE PICKER ============ */
  .lemma-display {
    text-align: center;
    margin: 30px 0 36px;
    padding: 0 10px;
  }
  .lemma-display .lemma-big {
    font-family: var(--display);
    font-size: 60px;
    line-height: 1;
    font-style: italic;
    font-weight: 500;
    font-variation-settings: "opsz" 144, "SOFT" 50;
    color: var(--ink);
    display: inline-block;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--accent-dim);
    letter-spacing: -0.01em;
  }
  .lemma-display .lemma-gloss {
    font-family: var(--serif);
    font-style: normal;
    font-size: 15px;
    color: var(--ink-mute);
    margin-top: 14px;
    letter-spacing: 0.02em;
  }
  .lemma-display .lemma-principal-parts {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-mute);
    margin-top: 6px;
    letter-spacing: -0.01em;
  }

  .mode-btn {
    display: block; width: 100%;
    padding: 18px 18px;
    margin-bottom: 10px;
    border: 1px solid var(--line-strong);
    background: var(--bg-card);
    color: var(--ink);
    border-radius: 2px;
    font-family: var(--serif); font-size: 15px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .mode-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.2s;
  }
  .mode-btn:active {
    background: var(--bg-elev);
    border-color: var(--accent-dim);
  }
  .mode-btn:active::before { transform: translateX(0); }
  .mode-btn .mb-title {
    font-family: var(--display);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 12px;
    color: var(--accent);
    display: block;
    margin-bottom: 6px;
  }
  .mode-btn .mb-desc {
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .mode-btn .mb-stat {
    font-family: var(--mono);
    font-style: normal;
    color: var(--ink-mute);
    margin-left: 4px;
    font-size: 12px;
    letter-spacing: -0.01em;
  }


  /* ============ MODE ROW W/ STEPPER ============ */
  .mode-row {
    display: flex;
    align-items: stretch;
    gap: 8px;
    margin-bottom: 10px;
  }
  .mode-row .mode-btn {
    margin-bottom: 0;
    flex: 1;
  }
  .rep-stepper {
    display: flex;
    align-items: center;
    border: 1px solid var(--line-strong);
    background: var(--bg-card);
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
    min-width: 110px;
  }
  .step-btn {
    width: 32px;
    flex-shrink: 0;
    align-self: stretch;
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-family: var(--serif);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 0;
    transition: background 0.1s, color 0.1s;
    -webkit-user-select: none;
    user-select: none;
  }
  .step-btn:active {
    background: var(--bg-elev);
    color: var(--accent);
  }
  .step-val {
    flex: 1;
    text-align: center;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink);
    padding: 0 4px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    -webkit-user-select: none;
    user-select: none;
  }
  .step-num { color: var(--accent); font-weight: 600; }
  .step-target { color: var(--ink-faint); font-size: 11px; }

  /* ============ DRILL ============ */
  .drill-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 18px;
    padding-top: 4px;
  }
  .back-btn {
    background: none; border: none;
    color: var(--accent);
    font-family: var(--display);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.24em;
    padding: 8px 0; cursor: pointer;
  }
  .back-btn::before { content: '← '; opacity: 0.7; }
  .drill-counter {
    font-family: var(--mono);
    color: var(--ink-mute);
    font-size: 12px;
  }
  .drill-counter .of { color: var(--ink-faint); margin: 0 3px; }

  .progress-bar {
    height: 1px;
    background: var(--line);
    margin-bottom: 28px;
    position: relative;
  }
  .progress-fill {
    height: 3px;
    background: var(--accent);
    transition: width 0.25s ease;
    margin-top: -1px;
    box-shadow: 0 0 8px rgba(212,145,90,0.35);
  }

  .prompt-label {
    font-family: var(--display);
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: 9px;
    color: var(--accent-dim);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .prompt-label::after {
    content: '';
    flex: 1; height: 1px;
    background: var(--line);
  }

  .prompt-card {
    background: var(--bg-card);
    border: 1px solid var(--line-strong);
    border-left: 2px solid var(--accent);
    padding: 26px 22px;
    margin-bottom: 20px;
    border-radius: 0;
  }
  .prompt-question {
    font-size: 19px;
    line-height: 1.35;
    color: var(--ink-soft);
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 12px;
  }
  .prompt-lemma {
    font-family: var(--display);
    font-style: italic;
    font-variation-settings: "opsz" 60, "SOFT" 40;
    color: var(--ink);
    font-weight: 500;
    font-size: 30px;
    letter-spacing: -0.01em;
  }
  .prompt-divider {
    color: var(--ink-faint);
    font-family: var(--display);
  }
  .prompt-spec {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .answer-input {
    width: 100%;
    padding: 18px 16px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 24px;
    border: 1px solid var(--line-strong);
    border-radius: 0;
    background: var(--bg-elev);
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
    transition: all 0.15s;
  }
  .answer-input::placeholder {
    color: var(--ink-faint);
    font-style: italic;
  }
  .answer-input:focus {
    border-color: var(--accent);
    background: var(--bg-card);
    box-shadow: inset 0 0 0 1px rgba(212,145,90,0.18);
  }
  .answer-input.correct {
    border-color: var(--good);
    background: rgba(132,169,132,0.08);
    color: var(--good);
  }
  .answer-input.wrong {
    border-color: var(--danger);
    background: rgba(217,100,88,0.06);
  }

  .feedback {
    min-height: 48px;
    margin-top: 14px;
    font-size: 14px;
    font-style: italic;
    padding: 0 4px;
  }
  .feedback.correct { color: var(--good); }
  .feedback.wrong { color: var(--danger); }
  .feedback .truth {
    font-style: normal; font-weight: 500;
    font-family: var(--serif); font-size: 17px;
    color: var(--ink);
  }
  .feedback .accepted {
    font-size: 12px; color: var(--ink-mute);
    font-style: italic; display: block; margin-top: 4px;
  }
  .feedback .accepted .truth { font-size: 14px; }

  .actions { display: flex; gap: 8px; margin-top: 18px; }
  button.btn {
    flex: 1;
    padding: 16px;
    font-family: var(--display);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid var(--ink-mute);
    background: var(--bg-card);
    color: var(--ink);
    border-radius: 0;
    cursor: pointer;
    transition: all 0.12s;
  }
  button.btn:active {
    background: var(--bg-elev);
    border-color: var(--ink-soft);
  }
  button.btn.primary {
    background: var(--accent);
    color: #1a1208;
    border-color: var(--accent);
    font-weight: 700;
  }
  button.btn.primary:active {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
  }
  button.btn.ghost {
    background: transparent;
    border-color: var(--line-strong);
    color: var(--ink-soft);
  }
  button.btn.ghost:active {
    border-color: var(--ink-mute);
    color: var(--ink);
  }

  /* ============ VERB SUB-TABLE PICKER ============ */
  .subtable-picker {
    margin-bottom: 18px;
    padding: 14px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 0;
  }
  .subtable-picker-label {
    font-family: var(--display);
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 9px;
    color: var(--accent-dim);
    margin-bottom: 6px;
    margin-top: 10px;
  }
  .subtable-picker-label:first-child { margin-top: 0; }
  .pill-row {
    display: flex; gap: 4px; flex-wrap: wrap;
  }
  .pill {
    padding: 6px 11px;
    border: 1px solid var(--line-strong);
    background: transparent;
    color: var(--ink-mute);
    font-family: var(--serif);
    font-size: 12px;
    font-style: italic;
    border-radius: 1px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.12s;
  }
  .pill:active { color: var(--ink); }
  .pill.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
    font-style: normal;
  }
  .pill:disabled { opacity: 0.25; cursor: not-allowed; }

  /* ============ TABLE MODE ============ */
  .paradigm-table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--line-strong);
    border-left: 2px solid var(--accent);
    padding: 18px 14px;
    margin-bottom: 18px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .paradigm-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
  }
  .paradigm-table th, .paradigm-table td {
    padding: 7px 5px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .paradigm-table th {
    font-family: var(--display);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 9px;
    color: var(--accent);
    font-weight: 600;
    border-bottom: 1px solid var(--line-strong);
    padding-bottom: 10px;
    padding-top: 4px;
  }
  .paradigm-table th.row-label,
  .paradigm-table td.row-label {
    text-align: right;
    padding-right: 12px;
    width: 56px;
    color: var(--accent);
    font-family: var(--display);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 10px;
    font-weight: 600;
  }
  .paradigm-table td.row-label { padding-top: 14px; padding-bottom: 10px; }
  .paradigm-table tbody tr { border-top: 1px solid var(--line); }
  .paradigm-table tbody tr:first-child { border-top: none; }
  .gender-header {
    color: var(--ink-mute) !important;
    font-style: italic;
    text-transform: lowercase !important;
    letter-spacing: 0 !important;
    font-family: var(--serif) !important;
    font-size: 11px !important;
  }

  .cell-input {
    width: 100%;
    min-width: 64px;
    padding: 9px 6px;
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    border: 1px solid transparent;
    border-bottom: 1px solid var(--line-strong);
    border-radius: 0;
    background: transparent;
    color: var(--ink);
    outline: none;
    -webkit-appearance: none;
    text-align: center;
    transition: all 0.12s;
  }
  .cell-input::placeholder { color: var(--ink-faint); }
  .cell-input:focus {
    border-color: var(--accent);
    background: var(--bg-elev);
    color: var(--ink);
  }
  .cell-input.correct {
    background: rgba(132,169,132,0.1);
    border-color: var(--good);
    color: var(--good);
    font-weight: 500;
  }
  .cell-input.wrong {
    background: rgba(217,100,88,0.08);
    border-color: var(--danger);
    color: var(--danger);
  }
  .cell-input.revealed {
    background: var(--bg-elev);
    border-color: var(--line-strong);
    color: var(--ink-soft);
    font-weight: 500;
  }
  .cell-empty {
    color: var(--ink-faint); opacity: 0.5;
    font-family: var(--mono);
  }

  .table-stats {
    display: flex; gap: 16px; justify-content: center;
    font-family: var(--mono);
    font-size: 12px;
    margin-bottom: 14px;
    padding: 10px 14px;
    background: var(--bg-card);
    border: 1px solid var(--line);
  }
  .table-stats .stat-label {
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-size: 9px;
    font-family: var(--display);
    margin-right: 4px;
  }
  .table-stats .stat-val { font-weight: 600; color: var(--ink); }
  .table-stats .stat-val.ok { color: var(--good); }
  .table-stats .stat-val.bad { color: var(--danger); }

  /* ============ COMPLETION ============ */
  .completion {
    text-align: center;
    padding: 50px 18px 30px;
  }
  .completion::before {
    content: '✦';
    display: block;
    color: var(--accent);
    font-size: 22px;
    margin-bottom: 30px;
    opacity: 0.6;
  }
  .completion h2 {
    font-family: var(--display);
    text-transform: uppercase;
    letter-spacing: 0.32em;
    color: var(--accent);
    margin: 0 0 8px;
    font-size: 14px;
    font-weight: 600;
  }
  .completion .repetitio-number {
    font-family: var(--display);
    font-style: italic;
    font-variation-settings: "opsz" 144, "SOFT" 100;
    color: var(--accent);
    font-size: 72px;
    font-weight: 500;
    margin: 8px 0 4px;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .completion .stats {
    font-style: italic; font-size: 16px;
    color: var(--ink-soft);
    margin: 20px 0 32px;
  }
  .completion .stats b {
    font-style: normal;
    color: var(--ink);
    font-family: var(--serif);
    font-weight: 600;
  }
  .completion .stats .missed { color: var(--ink-mute); }

  .rep-counter { padding: 6px 0 20px; }
  .rep-counter .big {
    font-family: var(--mono);
    font-size: 16px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.06em;
  }
  .rep-counter .big .target { color: var(--ink-faint); }
  .rep-counter .lbl {
    font-style: italic; font-size: 12px;
    color: var(--ink-mute);
    margin-top: 6px;
    text-transform: lowercase;
  }
  .rep-counter .progress-bar {
    max-width: 280px; margin: 14px auto 0;
    background: var(--line);
  }

  /* ============ SETTINGS ============ */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--line-strong);
    border-radius: 0;
    padding: 24px 22px;
    max-width: 440px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    position: relative;
  }
  .modal::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }
  .modal h3 {
    margin: 0 0 14px;
    font-family: var(--display);
    text-transform: uppercase;
    letter-spacing: 0.28em;
    font-size: 11px; color: var(--accent);
    font-weight: 600;
  }
  .modal h3:not(:first-child) {
    margin-top: 24px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
  }
  .modal .row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
  }
  .modal .row label {
    flex: 1; cursor: pointer;
    font-family: var(--serif);
    color: var(--ink);
  }
  .modal .row .row-detail {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-mute);
  }
  .modal textarea {
    width: 100%; min-height: 110px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    border: 1px solid var(--line-strong);
    border-radius: 0;
    background: var(--bg);
    color: var(--ink-soft);
    resize: vertical;
    margin-top: 8px;
    letter-spacing: -0.01em;
  }
  .modal .small-actions { display: flex; gap: 6px; margin-top: 10px; }
  .small-btn {
    padding: 8px 12px;
    font-size: 10px;
    font-family: var(--display);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    border: 1px solid var(--line-strong);
    background: var(--bg);
    border-radius: 0;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.12s;
  }
  .small-btn:active {
    border-color: var(--accent);
    color: var(--accent);
  }
  .small-btn.danger {
    color: var(--danger);
    border-color: var(--danger-dim);
  }
  .small-btn.danger:active {
    background: rgba(217,100,88,0.1);
  }
  .small-msg {
    font-size: 11px; color: var(--ink-mute);
    font-style: italic; margin-top: 8px;
    min-height: 14px;
  }
  .small-msg.success { color: var(--good); }
  .small-msg.error { color: var(--danger); }

  .toggle {
    position: relative;
    width: 42px; height: 24px;
    background: var(--bg);
    border: 1px solid var(--line-strong);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 1px; left: 1px;
    width: 20px; height: 20px;
    background: var(--ink-mute);
    border-radius: 50%;
    transition: all 0.18s ease;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle.on::after { left: 19px; background: var(--bg); }
  .toggle input { display: none; }

  .loader {
    text-align: center; padding: 60px 20px;
    font-style: italic; color: var(--ink-mute);
    font-family: var(--serif);
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  main > * { animation: fadein 0.25s ease-out both; }

  const modalRoot = document.getElementById('modal-root');
  const barTitle = document.getElementById('bar-title');
  const barSubtitle = document.getElementById('bar-subtitle');

  // ============== AUDIO ==============
  // Audio is hosted in audio/*.mp3 next to the HTML. Direct URL playback.
  let currentAudio = null;

  function getAudioFor(paradigmId) {
    return AUDIO[paradigmId] || null;
  }

  function hasAudioFor(paradigmId) {
    return !!AUDIO[paradigmId];
  }

  function stopAudio() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  }

  // ============== HELPERS ==============
  function stripMacrons(s) {
    if (!s) return s;
    return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase()
            .replace(/j/g, 'i').replace(/v/g, 'u');
  }
  function normalize(s) { return (s || '').trim().replace(/\s+/g, ' '); }
  function checkAnswer(typed, truth) {
    const splitCands = truth.split(/[,/]\s*/).map(x => x.trim()).filter(Boolean);
    const t = normalize(typed);
    if (!t) return { ok: false };
    for (const c of splitCands) {
      if (state.macronStrict) {
        if (t.toLowerCase() === c.toLowerCase()) return { ok: true, matched: c };
      } else {
        if (stripMacrons(t) === stripMacrons(c)) {
          const exact = t.toLowerCase() === c.toLowerCase();
          return { ok: true, matched: c, loose: !exact };
        }
      }
    }
    return { ok: false };
  }
  function shuffle(n) {
    const arr = Array.from({length: n}, (_, i) => i);
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }
  function fmtTime(s) {
    if (!isFinite(s)) return '0:00';
    const m = Math.floor(s/60); const sec = Math.floor(s%60);
    return m + ':' + (sec<10?'0':'') + sec;
  }
  function paradigmGroup(p) {
    if (p.category === 'noun') return { primary: '1. Nouns', secondary: p.sheet };
    if (p.category === 'adjective') return { primary: '2. Adjectives', secondary: p.section || '' };
    if (p.category === 'pronoun') return { primary: '3. Pronouns', secondary: p.section || '' };
    if (p.category === 'comparison') return { primary: '4. Comparison', secondary: '' };
    if (['1st conj','2nd conj','3rd conj','3rd conj i-stem','4th conj'].includes(p.sheet)) {
      return { primary: '5. Regular Verbs', secondary: p.sheet };
    }
    return { primary: '6. Irregular Verbs', secondary: '' };
  }

  // ============== PARSE LABELS to extract case/number/gender/etc. ==============
  // Noun: "nom sing." / "nom pl."
  // Adj/Pronoun: "nom sing. m." / "nom pl. f." (also "nom sing." for personal pronouns)
  // Verb: "pres. ind. act. 1sg"
  // Comparison: "comparative of X" / "superlative of X"
  function parsePromptLabel(label) {
    // try noun/adj/pronoun first
    let m = label.match(/^(nom|gen|dat|acc|abl|voc|loc) (sing\.|pl\.)( ([mfn]\.|m\.\/f\.|m\. & f\.|c\.))?$/);
    if (m) {
      return {
        type: 'declined',
        case: m[1],
        number: m[2] === 'sing.' ? 'sg' : 'pl',
        gender: m[4] || null
      };
    }
    // verb form
    m = label.match(/^(pres\.|imp\.|fut\.|perf\.|plup\.|fut\.perf\.) (ind\.|subj\.|imper\.) (act\.|pass\.) (1sg|2sg|3sg|1pl|2pl|3pl)$/);
    if (m) {
      const tenseMap = {'pres.':'present','imp.':'imperfect','fut.':'future','perf.':'perfect','plup.':'pluperfect','fut.perf.':'future perfect'};
      const moodMap = {'ind.':'indicative','subj.':'subjunctive','imper.':'imperative'};
      const voiceMap = {'act.':'active','pass.':'passive'};
      return {
        type: 'verb',
        tense: tenseMap[m[1]],
        mood: moodMap[m[2]],
        voice: voiceMap[m[3]],
        person: m[4]
      };
    }
    // comparison
    m = label.match(/^(comparative|superlative) of (.+)$/);
    if (m) {
      return { type: 'comparison', degree: m[1], positive: m[2] };
    }
    return { type: 'unknown', raw: label };
  }

  // ============== PICKER ==============
  function renderPicker() {
    stopAudio();
    state.view = 'picker';
    barTitle.textContent = 'Ranieri-Dowling';
    barSubtitle.textContent = 'Pick a paradigm to drill';

    let filtered = PARADIGMS;
    if (state.filter !== 'all') {
      filtered = PARADIGMS.filter(p => p.category === state.filter);
    }
    const groups = {};
    for (const p of filtered) {
      const g = paradigmGroup(p);
      if (!groups[g.primary]) groups[g.primary] = {};
      if (!groups[g.primary][g.secondary]) groups[g.primary][g.secondary] = [];
      groups[g.primary][g.secondary].push(p);
    }
    let html = `
      <div class="filter-tabs">
        <button class="filter-tab ${state.filter==='all'?'active':''}" data-filter="all">All</button>
        <button class="filter-tab ${state.filter==='noun'?'active':''}" data-filter="noun">Nouns</button>
        <button class="filter-tab ${state.filter==='adjective'?'active':''}" data-filter="adjective">Adj.</button>
        <button class="filter-tab ${state.filter==='pronoun'?'active':''}" data-filter="pronoun">Pron.</button>
        <button class="filter-tab ${state.filter==='comparison'?'active':''}" data-filter="comparison">Comp.</button>
        <button class="filter-tab ${state.filter==='verb'?'active':''}" data-filter="verb">Verbs</button>
      </div>`;
    const primaryOrder = ['1. Nouns','2. Adjectives','3. Pronouns','4. Comparison','5. Regular Verbs','6. Irregular Verbs'];
    for (const primary of primaryOrder) {
      if (!groups[primary]) continue;
      html += `<div class="group-label">${primary}</div>`;
      const subs = groups[primary];
      const subKeys = Object.keys(subs);
      const hasMultipleSubs = subKeys.length > 1 || (subKeys.length === 1 && subKeys[0]);
      for (const sub of subKeys) {
        if (hasMultipleSubs && sub) html += `<div class="subgroup-label">${sub}</div>`;
        html += '<ul class="paradigm-list">';
        for (const p of subs[sub]) {
          const reps = (state.repCounts[p.id] || 0) + (state.repCountsTable[p.id] || 0);
          let pipCls = 'reps-pip';
          if (reps >= 100) pipCls += ' done';
          else if (reps > 0) pipCls += ' partial';
          const parts = p.name.split(' — ');
          const display = parts.length === 2
            ? `<span class="lemma">${escapeHtml(parts[0])}</span><span class="gloss">${escapeHtml(parts[1])}</span>`
            : `<span class="lemma">${escapeHtml(p.name)}</span>`;
          html += `<li class="paradigm-item" data-id="${escapeAttr(p.id)}">
              <span class="paradigm-name">${display}</span>
              <span class="paradigm-meta"><span class="form-count">${p.prompts.length}f</span><span class="${pipCls}">${reps}</span></span>
            </li>`;
        }
        html += '</ul>';
      }
    }
    app.innerHTML = html;
    app.querySelectorAll('.filter-tab').forEach(t => {
      t.onclick = () => { state.filter = t.dataset.filter; persist(); renderPicker(); };
    });
    app.querySelectorAll('.paradigm-item').forEach(li => {
      li.onclick = () => openMode(li.dataset.id);
    });
  }

  // ============== MODE PICKER ==============
  function openMode(id) {
    const p = PARADIGMS.find(x => x.id === id);
    if (!p) return;
    state.currentParadigm = p;
    state.view = 'mode';
    renderMode();
  }
  function renderMode() {
    const p = state.currentParadigm;
    const lemma = p.name.split(' — ')[0];
    barTitle.textContent = lemma;
    barSubtitle.textContent = p.principal_parts || (p.name.split(' — ')[1] || '');
    const repsR = state.repCounts[p.id] || 0;
    const repsT = state.repCountsTable[p.id] || 0;

    const gloss = p.name.split(' — ')[1] || '';
    const pp = p.principal_parts || '';
    app.innerHTML = `
      <div class="drill-header">
        <button class="back-btn" id="back">paradigms</button>
      </div>
      <div class="lemma-display">
        <div class="lemma-big">${escapeHtml(lemma)}</div>
        ${gloss ? `<div class="lemma-gloss">${escapeHtml(gloss)}</div>` : ''}
        ${pp ? `<div class="lemma-principal-parts">${escapeHtml(pp)}</div>` : ''}
      </div>
      <div class="mode-row">
        <button class="mode-btn" data-mode="random">
          <span class="mb-title">Random drill</span>
          <span class="mb-desc">Each form prompted in turn.</span>
        </button>
        <div class="rep-stepper" data-which="random" aria-label="Random reps">
          <button class="step-btn" data-delta="-1" aria-label="decrement">−</button>
          <span class="step-val"><span class="step-num">${repsR}</span><span class="step-target">/100</span></span>
          <button class="step-btn" data-delta="1" aria-label="increment">+</button>
        </div>
      </div>
      <div class="mode-row">
        <button class="mode-btn" data-mode="table">
          <span class="mb-title">Fill the table</span>
          <span class="mb-desc">Type every form into the paradigm table at once.</span>
        </button>
        <div class="rep-stepper" data-which="table" aria-label="Table reps">
          <button class="step-btn" data-delta="-1" aria-label="decrement">−</button>
          <span class="step-val"><span class="step-num">${repsT}</span><span class="step-target">/100</span></span>
          <button class="step-btn" data-delta="1" aria-label="increment">+</button>
        </div>
      </div>
    `;
    document.getElementById('back').onclick = renderPicker;
    app.querySelectorAll('.mode-btn').forEach(btn => {
      btn.onclick = () => {
        const mode = btn.dataset.mode;
        if (mode === 'random') startDrill();
        else startTable();
      };
    });
    app.querySelectorAll('.rep-stepper').forEach(stepper => {
      const which = stepper.dataset.which;  // 'random' or 'table'
      const numEl = stepper.querySelector('.step-num');
      stepper.querySelectorAll('.step-btn').forEach(btn => {
        // Hold-to-repeat for fast adjustment
        let interval = null;
        let timeout = null;
        const delta = parseInt(btn.dataset.delta, 10);
        const apply = () => {
          const target = which === 'random' ? state.repCounts : state.repCountsTable;
          const cur = target[p.id] || 0;
          const next = Math.max(0, cur + delta);
          if (next === cur) return;
          target[p.id] = next;
          numEl.textContent = next;
          persist();
        };
        const start = (e) => {
          e.preventDefault();
          apply();
          // After 400ms hold, repeat every 80ms
          timeout = setTimeout(() => {
            interval = setInterval(apply, 80);
          }, 400);
        };
        const end = () => {
          if (timeout) { clearTimeout(timeout); timeout = null; }
          if (interval) { clearInterval(interval); interval = null; }
        };
        btn.addEventListener('mousedown', start);
        btn.addEventListener('touchstart', start, { passive: false });
        btn.addEventListener('mouseup', end);
        btn.addEventListener('mouseleave', end);
        btn.addEventListener('touchend', end);
        btn.addEventListener('touchcancel', end);
      });
    });
  }

  // ============== RANDOM DRILL ==============
  function startDrill() {
    const p = state.currentParadigm;
    state.promptOrder = shuffle(p.prompts.length);
    state.promptIdx = 0;
    state.correctCount = 0;
    state.wrongCount = 0;
    state.answered = false;
    state.typed = '';
    state.view = 'drill';
    renderDrill();
  }

  function renderDrill() {
    const p = state.currentParadigm;
    const lemma = p.name.split(' — ')[0];
    barTitle.textContent = lemma;
    barSubtitle.textContent = 'Random drill';

    const idx = state.promptOrder[state.promptIdx];
    const q = p.prompts[idx];
    const total = p.prompts.length;
    const progress = ((state.promptIdx) / total) * 100;
    const audioUrl = getAudioFor(p.id);

    app.innerHTML = `
      <div class="drill-header">
        <button class="back-btn" id="back">back</button>
        <div class="drill-counter">${state.promptIdx + 1}<span class="of">/</span>${total}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      ${audioUrl ? `
      <div class="audio-bar">
        <button class="audio-play-btn" id="audio-play" aria-label="Play audio">▶</button>
        <div class="audio-controls-wrap">
          <div class="audio-row1">
            <span class="audio-label">Ranieri recitation</span>
            <span class="audio-time" id="audio-time">0:00 / —:—</span>
          </div>
          <div class="audio-progress"><div class="audio-progress-fill" id="audio-fill"></div></div>
        </div>
      </div>` : ''}
      <div class="prompt-label">Decline</div>
      <div class="prompt-card">
        <div class="prompt-question">
          <span class="prompt-lemma">${escapeHtml(lemma)}</span>
          <span class="prompt-divider">·</span>
          <span class="prompt-spec">${escapeHtml(q.label)}</span>
        </div>
      </div>
      <input type="text" class="answer-input" id="ans"
             autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
             placeholder="type the form…" value="${escapeAttr(state.typed)}">
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="btn ghost" id="skip">Skip</button>
        <button class="btn primary" id="check">Check</button>
      </div>
    `;

    if (audioUrl) wireAudio(p.id, audioUrl);
    else stopAudio();

    const input = document.getElementById('ans');
    const feedback = document.getElementById('feedback');
    const checkBtn = document.getElementById('check');
    if (!audioUrl) setTimeout(() => input.focus(), 50);

    function doCheck() {
      if (state.answered) { advance(); return; }
      const typed = input.value;
      const res = checkAnswer(typed, q.answer);
      state.answered = true;
      if (res.ok) {
        state.correctCount++;
        input.classList.add('correct');
        feedback.className = 'feedback correct';
        feedback.innerHTML = res.loose
          ? `Correct ending. <span class="accepted">With macrons: <b>${escapeHtml(res.matched)}</b></span>`
          : `Correct.`;
      } else {
        state.wrongCount++;
        input.classList.add('wrong');
        feedback.className = 'feedback wrong';
        feedback.innerHTML = `Answer: <span class="truth">${escapeHtml(q.answer)}</span>`;
      }
      checkBtn.textContent = 'Next →';
    }
    function advance() {
      state.promptIdx++;
      state.answered = false;
      state.typed = '';
      if (state.promptIdx >= p.prompts.length) {
        state.repCounts[p.id] = (state.repCounts[p.id] || 0) + 1;
        persist();
        state.view = 'done';
        renderDone('random');
      } else {
        renderDrill();
      }
    }
    checkBtn.onclick = doCheck;
    document.getElementById('skip').onclick = () => {
      if (state.answered) { advance(); return; }
      state.wrongCount++;
      state.answered = true;
      input.value = '';
      input.classList.add('wrong');
      feedback.className = 'feedback wrong';
      feedback.innerHTML = `Skipped. Answer: <span class="truth">${escapeHtml(q.answer)}</span>`;
      checkBtn.textContent = 'Next →';
    };
    document.getElementById('back').onclick = () => {
      stopAudio();
      state.view = 'mode';
      renderMode();
    };
    input.addEventListener('input', (e) => { state.typed = e.target.value; });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); doCheck(); }
    });
  }

  function wireAudio(paradigmId, audioUrl) {
    const playBtn = document.getElementById('audio-play');
    const timeEl = document.getElementById('audio-time');
    const fillEl = document.getElementById('audio-fill');
    if (!currentAudio || currentAudio.dataset.paradigmId !== paradigmId) {
      stopAudio();
      const audio = new Audio(audioUrl);
      audio.dataset.paradigmId = paradigmId;
      audio.preload = 'metadata';
      currentAudio = audio;
    }
    const audio = currentAudio;
    function updatePlayBtn() {
      if (audio.paused) { playBtn.textContent = '▶'; playBtn.classList.remove('playing'); }
      else { playBtn.textContent = '❚❚'; playBtn.classList.add('playing'); }
    }
    function updateProgress() {
      const cur = audio.currentTime || 0;
      const dur = audio.duration || 0;
      timeEl.textContent = fmtTime(cur) + ' / ' + (isFinite(dur) ? fmtTime(dur) : '—:—');
      if (dur > 0) fillEl.style.width = (cur/dur*100) + '%';
    }
    audio.ontimeupdate = updateProgress;
    audio.onplay = updatePlayBtn;
    audio.onpause = updatePlayBtn;
    audio.onloadedmetadata = updateProgress;
    updatePlayBtn();
    updateProgress();
    playBtn.onclick = () => {
      if (audio.paused) audio.play().catch(e => console.warn('play failed', e));
      else audio.pause();
    };
  }

  // ============== TABLE MODE ==============
  function startTable() {
    state.view = 'table';
    state.tableValues = {};
    state.tableChecked = false;
    state.tableResults = {};
    // Default verb selection from first available prompt
    const p = state.currentParadigm;
    if (p.category === 'verb') {
      const parsedPrompts = p.prompts.map((q, i) => ({ ...parsePromptLabel(q.label), idx: i }));
      const first = parsedPrompts.find(x => x.type === 'verb');
      if (first) state.verbSelection = { mood: first.mood, tense: first.tense, voice: first.voice };
    }
    renderTable();
  }

  function getTablePromptsForCurrent() {
    // Returns the filtered list of prompts shown in the current table view
    const p = state.currentParadigm;
    const parsed = p.prompts.map((q, i) => ({ q, parsed: parsePromptLabel(q.label), idx: i }));
    if (p.category === 'verb') {
      const sel = state.verbSelection;
      if (sel.mood === 'imperative') {
        return parsed.filter(x => x.parsed.type === 'verb' && x.parsed.mood === 'imperative' && x.parsed.voice === sel.voice);
      }
      return parsed.filter(x => x.parsed.type === 'verb'
                                && x.parsed.mood === sel.mood
                                && x.parsed.tense === sel.tense
                                && x.parsed.voice === sel.voice);
    }
    return parsed;
  }

  function getAvailableVerbOptions() {
    const p = state.currentParadigm;
    const opts = { moods: new Set(), tenses: new Set(), voices: new Set() };
    for (const q of p.prompts) {
      const x = parsePromptLabel(q.label);
      if (x.type === 'verb') {
        opts.moods.add(x.mood);
        opts.tenses.add(x.tense);
        opts.voices.add(x.voice);
      }
    }
    return { moods: [...opts.moods], tenses: [...opts.tenses], voices: [...opts.voices] };
  }

  function getAvailableForSelection() {
    // For the currently-selected mood+voice, which tenses are actually available?
    const p = state.currentParadigm;
    const sel = state.verbSelection;
    const tensesForMoodVoice = new Set();
    const moodsForVoice = new Set();
    const voicesForMood = new Set();
    for (const q of p.prompts) {
      const x = parsePromptLabel(q.label);
      if (x.type !== 'verb') continue;
      if (x.mood === sel.mood && x.voice === sel.voice) tensesForMoodVoice.add(x.tense);
      if (x.voice === sel.voice) moodsForVoice.add(x.mood);
      if (x.mood === sel.mood) voicesForMood.add(x.voice);
    }
    return { tensesForMoodVoice, moodsForVoice, voicesForMood };
  }

  function renderTable() {
    const p = state.currentParadigm;
    const lemma = p.name.split(' — ')[0];
    barTitle.textContent = lemma;
    barSubtitle.textContent = 'Fill the table';
    const audioUrl = getAudioFor(p.id);

    let html = `
      <div class="drill-header">
        <button class="back-btn" id="back">back</button>
        <div class="drill-counter">table</div>
      </div>
      ${audioUrl ? `
      <div class="audio-bar">
        <button class="audio-play-btn" id="audio-play" aria-label="Play audio">▶</button>
        <div class="audio-controls-wrap">
          <div class="audio-row1">
            <span class="audio-label">Ranieri recitation</span>
            <span class="audio-time" id="audio-time">0:00 / —:—</span>
          </div>
          <div class="audio-progress"><div class="audio-progress-fill" id="audio-fill"></div></div>
        </div>
      </div>` : ''}
    `;

    if (p.category === 'verb') {
      html += renderVerbPicker();
    }

    html += renderTableHtml();

    // Stats line if checked
    if (state.tableChecked) {
      const correct = Object.values(state.tableResults).filter(v => v === 'correct').length;
      const total = Object.keys(state.tableResults).length;
      const wrong = total - correct;
      html += `<div class="table-stats">
        <span><span class="stat-label">Correct</span><span class="stat-val ok">${correct}</span></span>
        <span><span class="stat-label">Missed</span><span class="stat-val ${wrong?'bad':''}">${wrong}</span></span>
        <span><span class="stat-label">Total</span><span class="stat-val">${total}</span></span>
      </div>`;
    }

    html += `<div class="actions">
        <button class="btn ghost" id="reveal">Reveal all</button>
        <button class="btn primary" id="check-table">${state.tableChecked ? 'Reset' : 'Check'}</button>
      </div>`;

    if (state.tableChecked && p.category === 'verb') {
      html += `<div class="actions" style="margin-top:8px">
        <button class="btn" id="continue-table">Continue to next sub-table →</button>
      </div>`;
    }

    app.innerHTML = html;
    if (audioUrl) wireAudio(p.id, audioUrl);
    else stopAudio();

    wireTableEvents();
    document.getElementById('back').onclick = () => {
      stopAudio();
      state.view = 'mode';
      renderMode();
    };
  }

  function renderVerbPicker() {
    const opts = getAvailableVerbOptions();
    const sel = state.verbSelection;
    const avail = getAvailableForSelection();

    const moodOrder = ['indicative','subjunctive','imperative'];
    const tenseOrder = ['present','imperfect','future','perfect','pluperfect','future perfect'];
    const voiceOrder = ['active','passive'];

    let html = '<div class="subtable-picker">';
    html += '<div class="subtable-picker-label">Mood</div><div class="pill-row">';
    for (const m of moodOrder) {
      if (!opts.moods.includes(m)) continue;
      const active = sel.mood === m ? 'active' : '';
      const enabled = avail.moodsForVoice.has(m);
      html += `<button class="pill ${active}" data-mood="${m}" ${enabled?'':'disabled'}>${m}</button>`;
    }
    html += '</div>';

    if (sel.mood !== 'imperative') {
      html += '<div class="subtable-picker-label">Tense</div><div class="pill-row">';
      for (const t of tenseOrder) {
        if (!opts.tenses.includes(t)) continue;
        const active = sel.tense === t ? 'active' : '';
        const enabled = avail.tensesForMoodVoice.has(t);
        html += `<button class="pill ${active}" data-tense="${t}" ${enabled?'':'disabled'}>${t}</button>`;
      }
      html += '</div>';
    }

    html += '<div class="subtable-picker-label">Voice</div><div class="pill-row">';
    for (const v of voiceOrder) {
      if (!opts.voices.includes(v)) continue;
      const active = sel.voice === v ? 'active' : '';
      const enabled = avail.voicesForMood.has(v);
      html += `<button class="pill ${active}" data-voice="${v}" ${enabled?'':'disabled'}>${v}</button>`;
    }
    html += '</div></div>';
    return html;
  }

  function renderTableHtml() {
    const p = state.currentParadigm;
    const items = getTablePromptsForCurrent();
    if (items.length === 0) {
      return `<div class="paradigm-table-wrap"><div style="color:var(--muted); font-style:italic; text-align:center; padding:20px">No forms in this sub-table.</div></div>`;
    }

    if (p.category === 'verb') {
      // Verb: 6 cells: persons × numbers
      const cells = {};
      for (const it of items) {
        cells[it.parsed.person] = it;
      }
      const persons = ['1','2','3'];
      const numbers = ['sg','pl'];
      let html = `<div class="paradigm-table-wrap"><table class="paradigm-table">
        <thead><tr><th class="row-label"></th><th>singular</th><th>plural</th></tr></thead>
        <tbody>`;
      for (const pn of persons) {
        html += `<tr><td class="row-label">${pn}${suffixForPerson(pn)}</td>`;
        for (const num of numbers) {
          const key = pn + num;
          const it = cells[key];
          html += `<td>${renderCell(it)}</td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;
      return html;
    }

    // Comparison: 2 cols (comparative, superlative), 1 row per positive
    if (p.category === 'comparison') {
      // Group by positive
      const byPositive = {};
      for (const it of items) {
        if (it.parsed.type !== 'comparison') continue;
        const pos = it.parsed.positive;
        if (!byPositive[pos]) byPositive[pos] = {};
        byPositive[pos][it.parsed.degree] = it;
      }
      let html = `<div class="paradigm-table-wrap"><table class="paradigm-table">
        <thead><tr><th class="row-label">positive</th><th>comparative</th><th>superlative</th></tr></thead>
        <tbody>`;
      for (const pos of Object.keys(byPositive)) {
        html += `<tr><td class="row-label">${escapeHtml(pos)}</td>`;
        html += `<td>${renderCell(byPositive[pos].comparative)}</td>`;
        html += `<td>${renderCell(byPositive[pos].superlative)}</td>`;
        html += `</tr>`;
      }
      html += `</tbody></table></div>`;
      return html;
    }

    // Declined (noun/adj/pronoun)
    // Determine columns: which genders × numbers are present
    const declined = items.filter(it => it.parsed.type === 'declined');
    if (declined.length === 0) {
      return `<div class="paradigm-table-wrap"><div style="color:var(--muted); padding:20px">(no declined forms)</div></div>`;
    }
    const genders = [];
    const seenGenders = new Set();
    for (const it of declined) {
      const g = it.parsed.gender;
      if (g && !seenGenders.has(g)) { seenGenders.add(g); genders.push(g); }
    }
    const hasGenders = genders.length > 0;
    const numbers = [];
    const seenNumbers = new Set();
    for (const it of declined) {
      if (!seenNumbers.has(it.parsed.number)) { seenNumbers.add(it.parsed.number); numbers.push(it.parsed.number); }
    }
    // Cases in canonical order
    const caseOrder = ['nom','gen','dat','acc','abl','voc','loc'];
    const cases = caseOrder.filter(c => declined.some(it => it.parsed.case === c));

    // Build column list: each (number, gender) combination
    const cols = [];
    for (const num of numbers) {
      if (hasGenders) {
        for (const g of genders) cols.push({ number: num, gender: g });
      } else {
        cols.push({ number: num, gender: null });
      }
    }

    let html = `<div class="paradigm-table-wrap"><table class="paradigm-table">
      <thead>`;
    // For multi-number multi-gender, show number row + gender row
    if (hasGenders && numbers.length > 1) {
      html += `<tr><th class="row-label"></th>`;
      for (const num of numbers) {
        html += `<th colspan="${genders.length}">${num === 'sg' ? 'singular' : 'plural'}</th>`;
      }
      html += `</tr><tr><th class="row-label"></th>`;
      for (const num of numbers) {
        for (const g of genders) html += `<th class="gender-header">${g}</th>`;
      }
      html += `</tr>`;
    } else if (hasGenders) {
      html += `<tr><th class="row-label">${numbers[0] === 'sg' ? 'sing.' : 'pl.'}</th>`;
      for (const g of genders) html += `<th class="gender-header">${g}</th>`;
      html += `</tr>`;
    } else {
      html += `<tr><th class="row-label"></th>`;
      for (const num of numbers) html += `<th>${num === 'sg' ? 'singular' : 'plural'}</th>`;
      html += `</tr>`;
    }
    html += `</thead><tbody>`;

    for (const c of cases) {
      html += `<tr><td class="row-label">${c}.</td>`;
      for (const col of cols) {
        const it = declined.find(x => x.parsed.case === c
                                     && x.parsed.number === col.number
                                     && x.parsed.gender === col.gender);
        html += `<td>${renderCell(it)}</td>`;
      }
      html += `</tr>`;
    }
    html += `</tbody></table></div>`;
    return html;
  }

  function suffixForPerson(p) {
    return p === '1' ? 'st' : p === '2' ? 'nd' : 'rd';
  }

  function renderCell(it) {
    if (!it) return `<span class="cell-empty">—</span>`;
    const idx = it.idx;
    const checked = state.tableChecked;
    const result = state.tableResults[idx];
    const val = state.tableValues[idx] || '';
    let cls = 'cell-input';
    if (checked) {
      if (result === 'correct') cls += ' correct';
      else if (result === 'wrong') cls += ' wrong';
      else if (result === 'revealed') cls += ' revealed';
    }
    const displayVal = (checked && result !== 'correct') ? it.q.answer : val;
    const disabled = checked ? 'readonly' : '';
    return `<input type="text" class="${cls}" data-idx="${idx}"
                   autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
                   value="${escapeAttr(displayVal)}" ${disabled}>`;
  }

  function wireTableEvents() {
    const p = state.currentParadigm;
    // Verb pills
    if (p.category === 'verb') {
      document.querySelectorAll('.pill[data-mood]').forEach(b => {
        b.onclick = () => {
          if (b.disabled) return;
          state.verbSelection.mood = b.dataset.mood;
          state.tableValues = {};
          state.tableChecked = false;
          state.tableResults = {};
          renderTable();
        };
      });
      document.querySelectorAll('.pill[data-tense]').forEach(b => {
        b.onclick = () => {
          if (b.disabled) return;
          state.verbSelection.tense = b.dataset.tense;
          state.tableValues = {};
          state.tableChecked = false;
          state.tableResults = {};
          renderTable();
        };
      });
      document.querySelectorAll('.pill[data-voice]').forEach(b => {
        b.onclick = () => {
          if (b.disabled) return;
          state.verbSelection.voice = b.dataset.voice;
          state.tableValues = {};
          state.tableChecked = false;
          state.tableResults = {};
          renderTable();
        };
      });
    }

    // Cell inputs
    document.querySelectorAll('.cell-input').forEach(inp => {
      inp.addEventListener('input', (e) => {
        const idx = parseInt(inp.dataset.idx);
        state.tableValues[idx] = e.target.value;
      });
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          // jump to next cell
          const all = [...document.querySelectorAll('.cell-input')];
          const i = all.indexOf(inp);
          if (i >= 0 && i < all.length - 1) all[i+1].focus();
          else document.getElementById('check-table').click();
        }
      });
    });

    document.getElementById('check-table').onclick = () => {
      if (state.tableChecked) {
        // Reset
        state.tableValues = {};
        state.tableChecked = false;
        state.tableResults = {};
        renderTable();
      } else {
        checkTable();
      }
    };

    document.getElementById('reveal').onclick = revealTable;

    const continueBtn = document.getElementById('continue-table');
    if (continueBtn) continueBtn.onclick = continueToNextSubtable;
  }

  function checkTable() {
    const items = getTablePromptsForCurrent();
    state.tableResults = {};
    let correct = 0;
    for (const it of items) {
      const typed = state.tableValues[it.idx] || '';
      const res = checkAnswer(typed, it.q.answer);
      if (res.ok) {
        state.tableResults[it.idx] = 'correct';
        correct++;
      } else {
        state.tableResults[it.idx] = 'wrong';
      }
    }
    state.tableChecked = true;
    // Bump rep count if all correct AND we're not a verb (since verbs span multiple sub-tables)
    const p = state.currentParadigm;
    if (p.category !== 'verb' && correct === items.length && items.length > 0) {
      state.repCountsTable[p.id] = (state.repCountsTable[p.id] || 0) + 1;
      persist();
    }
    renderTable();
  }

  function revealTable() {
    const items = getTablePromptsForCurrent();
    state.tableResults = {};
    for (const it of items) {
      const typed = state.tableValues[it.idx] || '';
      if (!typed) {
        state.tableResults[it.idx] = 'revealed';
      } else {
        const res = checkAnswer(typed, it.q.answer);
        state.tableResults[it.idx] = res.ok ? 'correct' : 'wrong';
      }
    }
    state.tableChecked = true;
    renderTable();
  }

  function continueToNextSubtable() {
    // For verbs: advance through (mood, voice, tense) combinations.
    const p = state.currentParadigm;
    if (p.category !== 'verb') return;

    const order = [];
    const moodOrder = ['indicative','subjunctive','imperative'];
    const tenseOrder = ['present','imperfect','future','perfect','pluperfect','future perfect'];
    const voiceOrder = ['active','passive'];
    const opts = getAvailableVerbOptions();
    for (const m of moodOrder) {
      if (!opts.moods.includes(m)) continue;
      const tenses = m === 'imperative' ? [null] : tenseOrder.filter(t => opts.tenses.includes(t));
      for (const t of tenses) {
        for (const v of voiceOrder) {
          if (!opts.voices.includes(v)) continue;
          // does this combo exist?
          const exists = p.prompts.some(q => {
            const x = parsePromptLabel(q.label);
            if (x.type !== 'verb') return false;
            if (x.mood !== m) return false;
            if (m !== 'imperative' && x.tense !== t) return false;
            if (x.voice !== v) return false;
            return true;
          });
          if (exists) order.push({ mood: m, tense: t, voice: v });
        }
      }
    }
    const cur = state.verbSelection;
    const idx = order.findIndex(o => o.mood === cur.mood
                                  && (cur.mood === 'imperative' || o.tense === cur.tense)
                                  && o.voice === cur.voice);
    if (idx === -1 || idx === order.length - 1) {
      // Completed all sub-tables → count one full rep
      state.repCountsTable[p.id] = (state.repCountsTable[p.id] || 0) + 1;
      persist();
      state.view = 'done';
      renderDone('table');
      return;
    }
    const next = order[idx + 1];
    state.verbSelection = { mood: next.mood, tense: next.tense || cur.tense, voice: next.voice };
    state.tableValues = {};
    state.tableChecked = false;
    state.tableResults = {};
    renderTable();
  }

  // ============== COMPLETION ==============
  function renderDone(mode) {
    stopAudio();
    const p = state.currentParadigm;
    let reps, total;
    if (mode === 'random') {
      reps = state.repCounts[p.id];
      total = p.prompts.length;
    } else {
      reps = state.repCountsTable[p.id];
      total = p.prompts.length;
    }
    const progress = Math.min(100, (reps / 100) * 100);

    barTitle.textContent = 'Repetītiō ' + reps;
    barSubtitle.textContent = p.name;

    const correctStat = mode === 'random'
      ? `<b>${state.correctCount}</b> of <b>${total}</b> correct${state.wrongCount ? ` <span class="missed">· ${state.wrongCount} missed</span>` : ''}`
      : `<b>${total}</b> forms completed`;

    app.innerHTML = `
      <div class="completion">
        <h2>Repetītiō</h2>
        <div class="repetitio-number">${reps}</div>
        <div class="stats">${correctStat}</div>
        <div class="rep-counter">
          <div class="big">${reps}<span class="target"> / 100</span></div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${progress}%"></div>
          </div>
          <div class="lbl">${mode === 'random' ? 'random' : 'table'} repetitions</div>
        </div>
        <div class="actions" style="margin-top:32px">
          <button class="btn ghost" id="back-mode">Modes</button>
          <button class="btn primary" id="again">Again</button>
        </div>
      </div>
    `;
    document.getElementById('again').onclick = () => {
      if (mode === 'random') startDrill();
      else startTable();
    };
    document.getElementById('back-mode').onclick = () => {
      state.view = 'mode';
      renderMode();
    };
  }

  // ============== SETTINGS ==============
  function openSettings() {
    const totalReps = Object.values(state.repCounts).reduce((a,b)=>a+b, 0)
                    + Object.values(state.repCountsTable).reduce((a,b)=>a+b, 0);
    const paradigmsTouched = new Set([
      ...Object.keys(state.repCounts).filter(k => state.repCounts[k]>0),
      ...Object.keys(state.repCountsTable).filter(k => state.repCountsTable[k]>0)
    ]).size;
    const exportText = JSON.stringify({
      repCounts: state.repCounts,
      repCountsTable: state.repCountsTable
    }, null, 2);

    modalRoot.innerHTML = `
      <div class="modal-backdrop" id="backdrop">
        <div class="modal" onclick="event.stopPropagation()">
          <h3>Settings</h3>
          <div class="row">
            <label>Macron-strict checking
              <div style="font-size:12px;color:var(--ink-mute);font-style:italic;margin-top:2px">require long marks to count as correct</div>
            </label>
            <div class="toggle ${state.macronStrict?'on':''}" id="macron-toggle"></div>
          </div>
          <div class="row">
            <label>Total reps</label>
            <span class="row-detail">${totalReps}</span>
          </div>
          <div class="row">
            <label>Paradigms touched</label>
            <span class="row-detail">${paradigmsTouched}</span>
          </div>
          <h3 style="margin-top:18px">Backup / restore</h3>
          <div style="font-size:12px; color:var(--muted); font-style:italic; margin-bottom:6px">
            Rep counts live in this browser only. Copy the JSON to back up or move to another device.
          </div>
          <textarea id="data-area">${escapeHtml(exportText)}</textarea>
          <div class="small-actions">
            <button class="small-btn" id="copy-btn">Copy</button>
            <button class="small-btn" id="import-btn">Import</button>
            <button class="small-btn danger" id="reset-btn">Reset all reps</button>
          </div>
          <div class="small-msg" id="msg"></div>
          <div class="small-actions" style="margin-top:18px">
            <button class="small-btn" id="close-btn" style="flex:1">Close</button>
          </div>
        </div>
      </div>
    `;
    const msg = document.getElementById('msg');
    function setMsg(text, cls) { msg.textContent = text; msg.className = 'small-msg ' + (cls || ''); }
    const macronToggle = document.getElementById('macron-toggle');
    macronToggle.onclick = () => {
      state.macronStrict = !state.macronStrict;
      macronToggle.classList.toggle('on', state.macronStrict);
      persist();
    };
    document.getElementById('copy-btn').onclick = async () => {
      const txt = document.getElementById('data-area').value;
      try { await navigator.clipboard.writeText(txt); setMsg('Copied to clipboard.', 'success'); }
      catch (e) { setMsg('Copy failed — select the text manually.', 'error'); }
    };
    document.getElementById('import-btn').onclick = () => {
      const txt = document.getElementById('data-area').value;
      try {
        const parsed = JSON.parse(txt);
        if (parsed.repCounts) state.repCounts = parsed.repCounts;
        if (parsed.repCountsTable) state.repCountsTable = parsed.repCountsTable;
        persist();
        setMsg('Imported.', 'success');
      } catch (e) { setMsg('Invalid JSON: ' + e.message, 'error'); }
    };
    document.getElementById('reset-btn').onclick = () => {
      if (confirm('Reset all rep counts? This cannot be undone.')) {
        state.repCounts = {};
        state.repCountsTable = {};
        persist();
        setMsg('All counts cleared.', 'success');
        document.getElementById('data-area').value = JSON.stringify({ repCounts: {}, repCountsTable: {} }, null, 2);
      }
    };
    document.getElementById('close-btn').onclick = closeModal;
    document.getElementById('backdrop').onclick = closeModal;
  }
  function closeModal() {
    modalRoot.innerHTML = '';
    if (state.view === 'picker') renderPicker();
  }
  document.getElementById('menu-btn').onclick = openSettings;

  renderPicker();
})();

</script>
</body>
</html>
